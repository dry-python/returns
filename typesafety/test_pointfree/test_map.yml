- case: map_variance
  disable_cache: false
  main: |
    from returns.pointfree import map_
    from returns.maybe import Maybe

    class A: ...
    class B(A): ...
    class C(B): ...

    x: Maybe[B]

    def test(a: A) -> C:
        ...

    reveal_type(map_(test)(x))  # N: Revealed type is "returns.maybe.Maybe[main.C]"


- case: map_callback_protocol
  disable_cache: false
  main: |
    from typing import Callable, TypeVar
    from returns.pointfree import map_
    from returns.primitives.hkt import KindN, kinded
    from returns.interfaces.mappable import MappableN
    from returns.maybe import Maybe

    _T1 = TypeVar('_T1')
    _T2 = TypeVar('_T2')
    _T3 = TypeVar('_T3')
    _U1 = TypeVar('_U1')
    _Inst = TypeVar('_Inst', bound=MappableN)

    @kinded
    def ensure_callback(
        f: Callable[[KindN[_Inst, _T1, _T2, _T3]], KindN[_Inst, _U1, _T2, _T3]],
        c: KindN[_Inst, _T1, _T2, _T3],
    ) -> KindN[_Inst, _U1, _T2, _T3]:
        return f(c)

    def test(arg: int) -> float:
        return arg + 1.5

    reveal_type(ensure_callback(map_(test), Maybe.from_value(1)))  # N: Revealed type is "returns.maybe.Maybe[float]"


- case: map_and_flow
