- case: partial_generic_overload_kind1
  disable_cache: false
  main: |
    from typing import overload, TypeVar, List, Set
    from returns.curry import partial

    T = TypeVar('T')

    @overload
    def two_args(a: int, b: list[T]) -> T:
        ...

    @overload
    def two_args(a: int, b: set[T]) -> T:
        ...

    @overload
    def two_args(a: list[T], b: set[T]) -> T:
        ...

    def two_args(a, b):
        ...

    x: list[float]
    y: set[float]

    reveal_type(partial(two_args))
    reveal_type(partial(two_args, 1))
    reveal_type(partial(two_args, 1, x))
    reveal_type(partial(two_args, 1, y))
    reveal_type(partial(two_args, x))
    reveal_type(partial(two_args, x, y))
  out: |
    main:24: note: Revealed type is "Overload(def [T] (a: int, b: list[T]) -> T, def [T] (a: int, b: set[T]) -> T, def [T] (a: list[T], b: set[T]) -> T)"
    main:25: note: Revealed type is "Overload(def [T] (b: list[T]) -> T, def [T] (b: set[T]) -> T)"
    main:26: note: Revealed type is "def () -> float"
    main:27: note: Revealed type is "def () -> float"
    main:28: note: Revealed type is "def (b: set[float]) -> float"
    main:29: note: Revealed type is "def () -> float"


- case: partial_generic_overload_kind2
  disable_cache: false
  main: |
    from typing import overload, TypeVar, List, Union
    from returns.curry import partial

    A = TypeVar('A')
    B = TypeVar('B')

    @overload
    def two_args(a: int, b: list[A]) -> A:
        ...

    @overload
    def two_args(a: int, b: list[B]) -> B:
        ...

    @overload
    def two_args(a: list[A], b: list[B]) -> A | B:
        ...

    def two_args(a, b):
        ...

    a: list[float]
    b: list[str]

    reveal_type(partial(two_args))
    reveal_type(partial(two_args, 1))
    reveal_type(partial(two_args, 1, a))
    reveal_type(partial(two_args, 1, b))
    reveal_type(partial(two_args, a))
    reveal_type(partial(two_args, b))
    reveal_type(partial(two_args, a, b))
    reveal_type(partial(two_args, b, a))
  out: |
    main:25: note: Revealed type is "Overload(def [A] (a: int, b: list[A]) -> A, def [B] (a: int, b: list[B]) -> B, def [A, B] (a: list[A], b: list[B]) -> A | B)"
    main:26: note: Revealed type is "Overload(def [A] (b: list[A]) -> A, def [B] (b: list[B]) -> B)"
    main:27: note: Revealed type is "Overload(def () -> float, def () -> float)"
    main:28: note: Revealed type is "Overload(def () -> str, def () -> str)"
    main:29: note: Revealed type is "def [B] (b: list[B]) -> float | B"
    main:30: note: Revealed type is "def [B] (b: list[B]) -> str | B"
    main:31: note: Revealed type is "def () -> float | str"
    main:32: note: Revealed type is "def () -> str | float"
