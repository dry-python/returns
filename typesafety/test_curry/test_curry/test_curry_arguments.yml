- case: curry_pos_only_args
  disable_cache: false
  main: |
    from returns.curry import curry

    @curry
    def multiple(
        a: int,
        b: int,
        c: int,
        /,
        d: int,
    ) -> str:
        ...

    reveal_type(multiple)  # N: Revealed type is "Overload(def (int) -> Overload(def (int, int, d: int) -> str, def (int, int) -> def (d: int) -> str, def (int) -> Overload(def (int, d: int) -> str, def (int) -> def (d: int) -> str)), def (int, int) -> Overload(def (int, d: int) -> str, def (int) -> def (d: int) -> str), def (int, int, int) -> def (d: int) -> str, def (int, int, int, d: int) -> str)"


- case: curry_nested_overload1
  disable_cache: false
  main: |
    from typing import Generic, TypeVar
    from returns.curry import curry

    ValueType = TypeVar('ValueType')

    class MyClass(Generic[ValueType]):
        inner_value: ValueType

        def __init__(self, inner_value: ValueType) -> None:
            ...

    @curry
    def test(a: int, b: int) -> float:
        ...

    reveal_type(MyClass(test))  # N: Revealed type is "main.MyClass[Overload(def (a: int) -> def (b: int) -> float, def (a: int, b: int) -> float)]"


