- case: curry_init_magic_method
  disable_cache: false
  skip: true
  main: |
    from returns.curry import curry

    class Test(object):
        @curry
        def __init__(self, arg: int, other: str) -> None:
            ...

    reveal_type(Test)  # N: Revealed type is "Overload(def () -> main.Test, def (arg: int) -> main.Test, def (arg: int, other: str) -> main.Test)"


- case: curry_call_magic_method
  disable_cache: false
  main: |
    from returns.curry import curry

