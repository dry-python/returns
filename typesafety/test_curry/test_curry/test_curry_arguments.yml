- case: curry_regular_method
  disable_cache: false
  main: |
    from returns.curry import curry

    class Test(object):
        @curry
        def some(self, arg: int, other: float, last: str) -> str:
            ...

    reveal_type(Test.some)  # N: Revealed type is "Overload(def (self: main.Test) -> Overload(def (arg: int, other: float, last: str) -> str, def (arg: int, other: float) -> def (last: str) -> str, def (arg: int) -> Overload(def (other: float, last: str) -> str, def (other: float) -> def (last: str) -> str)), def (self: main.Test, arg: int) -> Overload(def (other: float, last: str) -> str, def (other: float) -> def (last: str) -> str), def (self: main.Test, arg: int, other: float) -> def (last: str) -> str, def (self: main.Test, arg: int, other: float, last: str) -> str)"

    reveal_type(Test.some(Test(), 1))  # N: Revealed type is "Overload(def (other: float, last: str) -> str, def (other: float) -> def (last: str) -> str)"

    reveal_type(Test().some)  # N: Revealed type is "Overload(def () -> Overload(def (arg: int, other: float, last: str) -> str, def (arg: int, other: float) -> def (last: str) -> str, def (arg: int) -> Overload(def (other: float, last: str) -> str, def (other: float) -> def (last: str) -> str)), def (arg: int) -> Overload(def (other: float, last: str) -> str, def (other: float) -> def (last: str) -> str), def (arg: int, other: float) -> def (last: str) -> str, def (arg: int, other: float, last: str) -> str)"

    reveal_type(Test().some(1))  # N: Revealed type is "Overload(def (other: float, last: str) -> str, def (other: float) -> def (last: str) -> str)"


