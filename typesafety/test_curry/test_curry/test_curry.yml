- case: curry_three_args
  disable_cache: false
  main: |
    from returns.curry import curry

    @curry
    def zero(arg: int, other: float, *, kw: bool) -> str:
        ...

    reveal_type(zero)  # N: Revealed type is "Overload(def (arg: int) -> Overload(def (other: float, *, kw: bool) -> str, def (other: float) -> def (*, kw: bool) -> str), def (arg: int, other: float) -> def (*, kw: bool) -> str, def (arg: int, other: float, *, kw: bool) -> str)"
    reveal_type(zero(1))  # N: Revealed type is "Overload(def (other: float, *, kw: bool) -> str, def (other: float) -> def (*, kw: bool) -> str)"
    reveal_type(zero(1, 2.0))  # N: Revealed type is "def (*, kw: bool) -> str"
    reveal_type(zero(1)(2.0))  # N: Revealed type is "def (*, kw: bool) -> str"
    reveal_type(zero(1, 2.0)(kw=True))  # N: Revealed type is "str"
    reveal_type(zero(1)(2.0)(kw=True))  # N: Revealed type is "str"
    reveal_type(zero(1, 2.0, kw=True))  # N: Revealed type is "str"
