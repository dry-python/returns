- case: curry_two_args1
  disable_cache: false
  main: |
    from returns.curry import curry

    @curry
    def zero(arg: int, other: float) -> str:
        ...

    reveal_type(zero)  # N: Revealed type is "Overload(def (arg: int) -> def (other: float) -> str, def (arg: int, other: float) -> str)"
    reveal_type(zero(1))  # N: Revealed type is "def (other: float) -> str"
    reveal_type(zero(1, 2.0))  # N: Revealed type is "str"
    reveal_type(zero(1)(2.0))  # N: Revealed type is "str"


