- case: future_decorator_with_args
  disable_cache: false
  main: |
    from typing import Optional
    from returns.future import future

    @future
    async def test(
        first: int, second: Optional[str] = None, *, kw: bool = True,
    ) -> int:
        ...

    reveal_type(test)  # N: Revealed type is "def (first: int, second: str | None =, *, kw: bool =) -> returns.future.Future[int]"


- case: future_composition
  disable_cache: false
  main: |
    from returns.future import future

    async def test(first: int) -> str:
        ...

    reveal_type(future(test))  # N: Revealed type is "def (first: int) -> returns.future.Future[str]"
