- case: impure_decorator_no_params
  disable_cache: false
  main: |
    from returns.io import impure

    @impure
    def test() -> int:
        return 1

    reveal_type(test)  # N: Revealed type is "def () -> returns.io.IO[int]"


- case: impure_composition_no_params
  disable_cache: false
  main: |
    from returns.io import impure

